name: Build and publish Docker image

# Builds the hotel_erp image (Dockerfile at repo root -- bakes the Frappe app
# into frappe/erpnext:v16.28.0, see that file's own comments) and pushes it
# to Docker Hub. This is the same image both a local `docker compose build`
# and the deployed stack run -- there is no separate "CI-only" build path,
# so what gets tested here is exactly what gets deployed.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    # Doc-only commits don't change what gets built -- skip the (identical)
    # rebuild-and-republish they'd otherwise trigger.
    paths-ignore:
      - "**.md"
      - "LICENSE"
  workflow_dispatch: {}

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # frappe/erpnext (this image's base) only publishes linux/amd64, so
      # building any other platform would need QEMU emulation for no real
      # benefit -- every service in both compose files already pins
      # `platform: linux/amd64` for the same reason.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Derives tags from the git ref: `latest` + short-sha on every push to
      # main (sha tags exist so a bad `latest` can be rolled back to a known
      # good image by digest/tag rather than by re-building), plus semver
      # tags (v1.2.3 -> 1.2.3, 1.2, 1) when a version tag is pushed.
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/hotels_erp
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
